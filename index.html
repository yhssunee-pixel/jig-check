<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>지그 QR 스캐너</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #000; overflow: hidden; }
  .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: white; text-align: center; padding: 16px; font-size: 16px; font-weight: 700; z-index: 10; }
  .camera-wrap { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  video { width: 100%; height: 100%; object-fit: cover; }
  canvas { display: none; }
  .overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%); width: 250px; height: 250px; border: 3px solid #4361ee; border-radius: 16px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); z-index: 5; }
  .overlay-text { position: fixed; bottom: 80px; left: 0; right: 0; text-align: center; color: white; font-size: 14px; z-index: 10; }
  .status { position: fixed; top: 60px; left: 0; right: 0; text-align: center; color: #4fc3f7; font-size: 14px; padding: 10px; z-index: 10; }
  .result-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 16px; padding: 24px; width: 85%; max-width: 340px; text-align: center; z-index: 20; box-shadow: 0 8px 32px rgba(0,0,0,0.3); display: none; }
  .result-popup.show { display: block; }
  .popup-icon { font-size: 48px; margin-bottom: 12px; }
  .popup-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .popup-info { font-size: 13px; color: #555; margin-bottom: 4px; }
  .popup-bar { height: 4px; background: #4361ee; border-radius: 2px; margin-top: 16px; animation: shrink 2s linear forwards; }
  @keyframes shrink { from { width: 100%; } to { width: 0%; } }
</style>
</head>
<body>

<div class="header">🦷 임플란트 지그 스캐너</div>
<div class="status" id="status">카메라 시작 중...</div>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div class="overlay"></div>
<div class="overlay-text">QR코드를 네모 안에 맞춰주세요</div>

<div class="result-popup" id="popup">
  <div class="popup-icon" id="popupIcon"></div>
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-info" id="popupInfo1"></div>
  <div class="popup-info" id="popupInfo2"></div>
  <div class="popup-info" id="popupInfo3"></div>
  <div class="popup-bar" id="popupBar"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxXU-TkUsechPUZWqsYOq99Hzrgroxv5KJHRa18up3deqd_uE_M9SBNAfj0yQd7QIZJw/exec";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");
const popup = document.getElementById("popup");

let processing = false;

navigator.mediaDevices.getUserMedia({ 
  video: { facingMode: "environment" } 
}).then(stream => {
  video.srcObject = stream;
  video.play();
  status.textContent = "QR코드를 스캔하세요";
  requestAnimationFrame(tick);
}).catch(err => {
  status.textContent = "카메라 오류: " + err.message;
});

function tick() {
  if (video.readyState === video.HAVE_ENOUGH_DATA && !processing) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code) {
      processing = true;
      let raw = code.data;
      let caseId = raw;
      if (raw.includes("order_qr/")) {
        caseId = raw.split("order_qr/")[1];
      }
      status.textContent = "처리 중...";
      checkCase(caseId);
    }
  }
  requestAnimationFrame(tick);
}

function checkCase(caseId) {
  const script = document.createElement("script");
  const callbackName = "cb_" + Date.now();
  
  window[callbackName] = function(result) {
    document.head.removeChild(script);
    delete window[callbackName];
    showResult(result);
  };

  script.src = APPS_SCRIPT_URL + "?action=check&case_id=" + encodeURIComponent(caseId) + "&callback=" + callbackName;
  script.onerror = function() {
    showPopup("❌", "연결 오류", "네트워크를 확인해주세요", "", "");
  };
  document.head.appendChild(script);
}

function showResult(result) {
  if (result.status === "notfound") {
    showPopup("⚠️", "리스트에 없음", "오늘 임플란트 리스트에 없는 케이스", "", "");
  } else if (result.status === "already") {
    showPopup("✅", "이미 완료됨", "거래처: " + result.info[1], "환자: " + result.info[2], "치식: " + result.info[4]);
  } else {
    showPopup("✅", "지그 확인 완료!", "거래처: " + result.info[1], "환자: " + result.info[2], "치식: " + result.info[4]);
  }
}

function showPopup(icon, title, info1, info2, info3) {
  document.getElementById("popupIcon").textContent = icon;
  document.getElementById("popupTitle").textContent = title;
  document.getElementById("popupInfo1").textContent = info1;
  document.getElementById("popupInfo2").textContent = info2;
  document.getElementById("popupInfo3").textContent = info3;

  const bar = document.getElementById("popupBar");
  bar.style.animation = "none";
  bar.offsetHeight;
  bar.style.animation = "shrink 2s linear forwards";

  popup.classList.add("show");

  setTimeout(() => {
    popup.classList.remove("show");
    processing = false;
    status.textContent = "QR코드를 스캔하세요";
  }, 2000);
}
</script>
</body>
</html>
